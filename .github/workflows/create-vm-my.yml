name: Create OCI ARM Instance

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest

    steps:
      - name: Install OCI CLI
        uses: oracle-actions/install-oci-cli@v1
        with:
          oci-cli-version: '3.48.0'

      - name: Configure OCI CLI
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${OCI_USER}" >> ~/.oci/config
          echo "tenancy=${OCI_TENANCY}" >> ~/.oci/config
          echo "fingerprint=${OCI_FINGERPRINT}" >> ~/.oci/config
          echo "region=${OCI_REGION}" >> ~/.oci/config
          echo "key_content=${OCI_PRIVATE_KEY}" >> ~/.oci/config

      - name: Launch VM Instance
        id: launch
        continue-on-error: true
        env:
          COMPARTMENT_ID: ${{ secrets.OCI_TENANCY }}   # 根区间，通常等于租户 OCID
          SUBNET_ID: ${{ secrets.OCI_SUBNET }}
          IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          AD_NAME: ${{ secrets.AD_NAME }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          oci compute instance launch \
            --availability-domain "${AD_NAME}" \
            --compartment-id "${COMPARTMENT_ID}" \
            --shape "VM.Standard.A1.Flex" \
            --display-name "hermes-agent-vm" \
            --image-id "${IMAGE_ID}" \
            --subnet-id "${SUBNET_ID}" \
            --assign-public-ip true \
            --ssh-authorized-keys "${SSH_PUBLIC_KEY}" \

      - name: Check success
        if: steps.launch.outcome == 'success'
        run: echo "✅ 实例创建成功！"
