name: Try to Create OCI VM

on:
  schedule:
    # 每15分钟自动运行一次，持续尝试创建，直到成功
    - cron: '*/15 * * * *'
  workflow_dispatch:    # 允许在 GitHub Actions 页面手动触发

jobs:
  create-oci-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH
      - name: Run OCI commands
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER }}               # 用户 OCID
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY }}         # 租户 OCID
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }} # API 密钥指纹
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }} # API 私钥内容
          OCI_CLI_REGION: ${{ secrets.OCI_REGION }}           # 区域 (如 ap-singapore-1)
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${OCI_USER}" >> ~/.oci/config
          echo "tenancy=${OCI_TENANCY}" >> ~/.oci/config
          echo "fingerprint=${OCI_FINGERPRINT}" >> ~/.oci/config
          echo "region=${OCI_REGION}" >> ~/.oci/config
          echo "key_content=${OCI_PRIVATE_KEY}" >> ~/.oci/config

      - name: Launch VM Instance
        id: launch
        continue-on-error: true
        env:
          COMPARTMENT_ID: ${{ secrets.OCI_TENANCY }}   # 根区间，通常等于租户 OCID
          SUBNET_ID: ${{ secrets.OCI_SUBNET }}
          IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          AD_NAME: ${{ secrets.AD_NAME }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          # 将公钥写入临时文件
          echo "$SSH_PUBLIC_KEY" > /tmp/ssh_key.pub
          oci compute instance launch \
            --availability-domain "${AD_NAME}" \
            --compartment-id "${COMPARTMENT_ID}" \
            --shape "VM.Standard.A1.Flex" \
            --display-name "hermes-agent-vm" \
            --image-id "${IMAGE_ID}" \
            --subnet-id "${SUBNET_ID}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \

      - name: Check success
        if: steps.launch.outcome == 'success'
        run: echo "✅ 实例创建成功！"
